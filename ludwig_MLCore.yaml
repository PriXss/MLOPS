{
    "input_features": [
        {
            "name": "date",
            "type": "date"
        },
        {
            "name": "open",
            "type": "numerical"
        },
        {
            "name": "high",
            "type": "numerical"
        },
        {
            "name": "low",
            "type": "numerical"
        },
        {
            "name": "close",
            "type": "numerical"
        },
        {
            "name": "volume",
            "type": "numerical"
        },
        {
            "name": "RSI",
            "type": "numerical"
        },
        {
            "name": "EMA",
            "type": "numerical"
        }
    ],
    "output_features": [
        {
            "name": "Prediction",
            "type": "numerical"
        }
    ],
    "training": {
        "batch_size": 32,
        "epochs": 100,
        "learning_rate": 0.001,
        "optimizer": {
            "type": "adam"
        }
    },
    "model": {
        "type": "deep_lstm",
        "num_layers": 2,
        "num_hidden_units": 64,
        "dropout": 0.1,
        "recurrent_dropout": 0.1,
        "output_activation": "linear"
    }

}

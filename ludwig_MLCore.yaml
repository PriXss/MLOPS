input_features:

  - name: Tag
    type: numerical
    preprocessing:
      zscore:
        enabled: true

  - name: Monat
    type: numerical
    preprocessing:
      zscore:
        enabled: true

  - name: Jahr
    type: numerical
    preprocessing:
      zscore:
        enabled: false

  - name: Schluss
    type: numerical

output_features:
  -
    name: Schluss
    type: numerical

training:
  epochs: 15

model:
  type: timeseries

combiner:
    type: sequence_concat
    dropout: 0.0
    num_fc_layers: 0
    output_size: 256
    norm: null
    activation: relu
    flatten_inputs: false
    residual: false
    use_bias: true
    bias_initializer: zeros
    weights_initializer: xavier_uniform
    norm_params: null
    fc_layers: null

preprocessing:
  fill_missing: false

output_directory: ../results

stages:
  collectDataStage:
    cmd: python3 src/collectData.py data/testtest.csv
    deps:
    - data/testtest.csv
    - src/collectData.py
    outs:
    - data/collected
  dataAnalysisStage:
    cmd: python3 src/src/dataAnalysis.py data/collected data/analysed
    deps:
    - data/collected
    - src/dataAnalysis.py
    outs:
    - data/analysed